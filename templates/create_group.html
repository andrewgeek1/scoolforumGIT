{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4>Создать группу</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Название группы:</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Описание:</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Опишите цель и тематику группы..."></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Тип группы:</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="is_public" id="public_group" value="true" checked>
                            <label class="form-check-label" for="public_group">
                                🌐 Публичная группа
                            </label>
                            <small class="form-text text-muted d-block">
                                Любой пользователь может вступить без одобрения
                            </small>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="is_public" id="private_group" value="false">
                            <label class="form-check-label" for="private_group">
                                🔒 Закрытая группа
                            </label>
                            <small class="form-text text-muted d-block">
                                Вступление только по одобрению создателя группы
                            </small>
                        </div>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_class_group" name="is_class_group">
                        <label class="form-check-label" for="is_class_group">
                            🎓 Группа для всего класса {{ current_user.class_name }}
                        </label>
                        <small class="form-text text-muted d-block">
                            Автоматически включает всех одноклассников, всегда публичная
                        </small>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Создать группу</button>
                        <a href="{{ url_for('groups') }}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
